name: Crawl AMC Showtimes

on:
  schedule:
    # 每小时整点运行，覆盖洛杉矶时间 6am-11pm
    # UTC 13:00-23:00 = LA 6am-4pm (PDT) / 5am-3pm (PST)
    # UTC 00:00-06:00 = LA 5pm-11pm (PDT) / 4pm-10pm (PST)
    - cron: '0 13-23 * * *'
    - cron: '0 0-6 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run crawler
      run: python crawler/scraper.py

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"

    - name: Commit and push changes
      run: |
        git add data/showtimes.json data/last_updated.json
        git diff --quiet && git diff --staged --quiet || (
            git commit -m "chore: update showtimes data" &&
            git push
        )
