name: Crawl AMC Showtimes

on:
  schedule:
    # 每小时运行一次，覆盖洛杉矶时间 6am-11pm
    # 注意：使用 :17 分钟错开 UTC 整点，避开 GitHub Actions cron 高峰拥堵
    # （整点是全平台 cron 任务最集中的时刻，最容易被延迟或跳过）
    # UTC 13:17-23:17 = LA 06:17-16:17 (PDT) / 05:17-15:17 (PST)
    # UTC 00:17-06:17 = LA 17:17-23:17 (PDT) / 16:17-22:17 (PST)
    - cron: '17 13-23 * * *'
    - cron: '17 0-6 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install chromium --with-deps

    - name: Run crawler
      run: python crawler/scraper.py

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"

    - name: Commit and push changes
      run: |
        git add data/showtimes.json data/last_updated.json
        git diff --quiet && git diff --staged --quiet || (
            git commit -m "chore: update showtimes data" &&
            git push
        )
