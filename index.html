<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC电影院周末排片 | Los Angeles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --amc-red: #E4002B;
            --dark-bg: #0a0e27;
            --row-bg: #1a1f3a;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c1;
            --border-color: #2a3f5f;
            --accent: #00d4ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1428 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .header-content h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--amc-red), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .header-content p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .update-info {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(228, 0, 43, 0.1);
            border-left: 3px solid var(--amc-red);
            border-radius: 4px;
            display: inline-block;
        }

        .update-info span {
            color: var(--text-secondary);
        }

        .update-info .time {
            color: var(--accent);
            font-weight: 600;
        }

        .refresh-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--amc-red), #ff6b6b);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(228, 0, 43, 0.3);
        }

        /* 表格容器 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--row-bg);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        /* 表头 */
        thead {
            background: linear-gradient(90deg, rgba(228, 0, 43, 0.15), rgba(0, 212, 255, 0.1));
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-right: 1px solid var(--border-color);
        }

        th:last-child {
            border-right: none;
        }

        th:first-child {
            width: 80px;
            color: var(--amc-red);
        }

        /* 表格行 */
        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(228, 0, 43, 0.05);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        /* 表格单元格 */
        td {
            padding: 16px 12px;
            border-right: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        td:last-child {
            border-right: none;
        }

        /* 日期列 */
        td:first-child {
            width: 80px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--amc-red);
            vertical-align: top;
            padding-top: 18px;
        }

        /* 影院数据单元格 */
        .theater-cell {
            vertical-align: top;
            min-height: 80px;
        }

        .movie-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .showtimes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .showtime {
            padding: 3px 8px;
            background: rgba(228, 0, 43, 0.2);
            border: 1px solid rgba(228, 0, 43, 0.4);
            border-radius: 3px;
            font-size: 0.8rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .empty {
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px 12px;
            text-align: center;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--amc-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            padding: 20px;
            background: rgba(228, 0, 43, 0.15);
            border: 1px solid var(--amc-red);
            border-radius: 8px;
            color: #ff9a9a;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header-content h1 {
                font-size: 1.6rem;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }

            th:first-child, td:first-child {
                width: 60px;
                font-size: 1rem;
            }

            .showtime {
                font-size: 0.75rem;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🍿 AMC 周末排片</h1>
                <p>洛杉矶 IMAX & Dolby Cinema</p>
                <div class="update-info">
                    <span>最后更新：</span>
                    <span class="time" id="updateTime">加载中...</span>
                </div>
                <button class="refresh-btn" onclick="loadData()">刷新数据</button>
            </div>
        </header>

        <main id="mainContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载排片信息中...</p>
            </div>
        </main>

        <footer>
            <p>数据由自动爬虫每天更新 | 仅供参考，请以AMC官网为准</p>
        </footer>
    </div>

    <script>
        const DATA_PATH = './data/showtimes.json';
        const UPDATE_TIME_PATH = './data/last_updated.json';

        async function loadData() {
            try {
                const mainContent = document.getElementById('mainContent');
                mainContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载排片信息中...</p></div>';

                const showtimesResponse = await fetch(DATA_PATH + '?t=' + Date.now());
                if (!showtimesResponse.ok) {
                    throw new Error('无法加载排片数据');
                }
                const showtimes = await showtimesResponse.json();

                try {
                    const updateResponse = await fetch(UPDATE_TIME_PATH + '?t=' + Date.now());
                    if (updateResponse.ok) {
                        const updateData = await updateResponse.json();
                        updateTime(updateData.timestamp);
                    }
                } catch (e) {
                    console.warn('无法加载更新时间:', e);
                }

                renderData(showtimes);
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('mainContent').innerHTML = `
                    <div class="error">
                        <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
                        <p>无法加载排片数据，请稍后重试或检查网络连接</p>
                    </div>
                `;
            }
        }

        function updateTime(timestamp) {
            const timeElement = document.getElementById('updateTime');
            try {
                const date = new Date(timestamp);
                const formatted = date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    timeZone: 'America/Los_Angeles'
                });
                timeElement.textContent = formatted + ' (LA时间)';
            } catch (e) {
                timeElement.textContent = timestamp;
            }
        }

        function renderData(showtimes) {
            // 收集所有日期（按排序）
            const allDates = new Set();
            const theaterNames = [];

            for (const theaterKey in showtimes) {
                const theater = showtimes[theaterKey];
                theaterNames.push(theater.name);
                for (const date in theater.dates) {
                    allDates.add(date);
                }
            }

            const sortedDates = Array.from(allDates).sort();

            // 生成表格HTML
            let html = '<div class="table-wrapper"><table>';

            // 表头
            html += '<thead><tr><th>日期</th>';
            for (const theaterName of theaterNames) {
                html += `<th>${theaterName}</th>`;
            }
            html += '</tr></thead>';

            // 表体
            html += '<tbody>';
            for (const date of sortedDates) {
                const dateObj = new Date(date.split('-').map(Number)[0], date.split('-').map(Number)[1] - 1, date.split('-').map(Number)[2]);
                const dayStr = dateObj.toLocaleDateString('zh-CN', { weekday: 'short' });
                const dateStr = dateObj.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });

                html += `<tr><td>${dateStr}<br><span style="font-size: 0.75rem; color: var(--text-secondary);">${dayStr}</span></td>`;

                for (const theaterKey in showtimes) {
                    const theater = showtimes[theaterKey];
                    const dateData = theater.dates[date];

                    if (dateData && dateData.movies && dateData.movies.length > 0) {
                        html += '<td class="theater-cell">';
                        for (const movie of dateData.movies) {
                            html += `<div class="movie-title">${escapeHtml(movie.title)}</div>`;
                            if (movie.showtimes && movie.showtimes.length > 0) {
                                html += '<div class="showtimes">';
                                for (const time of movie.showtimes) {
                                    html += `<span class="showtime">${escapeHtml(time)}</span>`;
                                }
                                html += '</div>';
                            }
                        }
                        html += '</td>';
                    } else {
                        html += '<td class="theater-cell"><div class="empty">暂无排片</div></td>';
                    }
                }

                html += '</tr>';
            }

            html += '</tbody></table></div>';
            document.getElementById('mainContent').innerHTML = html;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
