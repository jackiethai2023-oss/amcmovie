<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 8-Week Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 2.5rem;
        }

        /* Header */
        header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-inner {
            max-width: 56rem;
            margin: 0 auto;
            padding: 0.75rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-main {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-main h1 {
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 0.5625rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 0.125rem;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            background: rgba(255, 255, 255, 0);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.625rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.375);
        }

        .refresh-btn:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
        }

        .spinner {
            width: 0.75rem;
            height: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-top-color: #ff8c42;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Content */
        main {
            max-width: 56rem;
            margin: 0 auto;
            padding: 0.5rem;
            padding-top: 1rem;
        }

        /* Error */
        .error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.625rem;
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Loading State */
        .loading-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .loading-item {
            height: 4rem;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Table Layout */
        .table-container {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .table-header {
            display: none;
        }

        @media (min-width: 640px) {
            .table-header {
                display: grid;
                grid-template-columns: 80px 1fr 1fr 1fr;
                gap: 0.5rem;
                padding: 0 1rem;
                padding-top: 0.5rem;
                padding-bottom: 0.5rem;
                font-size: 0.625rem;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.15);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        .table-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.25rem;
            padding: 0.5rem;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            transition: all 0.15s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(0.3125rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-row:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        @media (min-width: 640px) {
            .table-row {
                grid-template-columns: 80px 1fr 1fr 1fr;
                gap: 0.5rem;
                padding: 0.75rem;
            }
        }

        /* Date Column */
        .date-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (min-width: 640px) {
            .date-cell {
                flex-direction: column;
                align-items: flex-start;
                gap: 0;
            }
        }

        .date-value {
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #ff8c42;
        }

        .day-label {
            font-size: 0.5625rem;
            color: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            display: none;
        }

        @media (min-width: 640px) {
            .day-label {
                display: block;
            }
        }

        /* Holiday styles */
        .holiday-label {
            font-size: 0.5rem;
            background-color: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            display: inline-block;
            margin-top: 0.25rem;
            text-transform: uppercase;
            font-weight: 600;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .date-cell-holiday .date-value {
            color: #fca5a5;
        }

        @media (min-width: 640px) {
            .date-cell-holiday {
                background-color: rgba(239, 68, 68, 0.05);
                padding: 0.5rem;
                border-radius: 0.375rem;
                border: 1px solid rgba(239, 68, 68, 0.2);
            }
        }

        /* Theater Cell */
        .theater-cell {
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 0.5rem;
        }

        @media (min-width: 640px) {
            .theater-cell {
                border-left: none;
                padding-left: 0;
            }
        }

        .theater-label {
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        @media (min-width: 640px) {
            .theater-label {
                display: none;
            }
        }

        /* Movie */
        .movie-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .movie-header {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .movie-title {
            font-size: 0.6875rem;
            font-weight: 500;
            line-height: 1.2;
            color: #ffffff;
        }

        a.movie-title {
            color: #ff8c42;
            text-decoration: none;
            transition: color 0.15s;
            cursor: pointer;
        }

        a.movie-title:hover {
            color: #ffaa66;
            text-decoration: underline;
        }

        /* "SOON"状态的电影 - 不可购票 */
        .movie-info.status-soon {
            opacity: 0.5;
            pointer-events: none;
        }

        .movie-info.status-soon a.movie-title {
            color: rgba(255, 140, 66, 0.5);
            cursor: not-allowed;
        }

        .movie-info.status-soon a.movie-title:hover {
            color: rgba(255, 140, 66, 0.5);
            text-decoration: none;
        }

        /* SOON电影的排片时间 - 灰色显示 */
        .movie-info.status-soon .showtime {
            background-color: rgba(107, 114, 128, 0.15);
            border-color: rgba(107, 114, 128, 0.3);
            color: rgba(156, 163, 175, 0.8);
        }

        .empty {
            font-size: 0.625rem;
            color: rgba(255, 255, 255, 0.05);
            font-style: italic;
        }

        /* Status Badge */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-full {
            color: #22c55e;
        }

        .status-partial {
            color: #ff8c42;
        }

        .status-soon {
            color: #ef4444;
        }

        .status-icon {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            display: inline-block;
        }

        /* 70MM Badge */
        .badge-70mm {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.25rem;
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.25rem;
            font-size: 0.45rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ef4444;
            letter-spacing: 0.02em;
            margin-left: 0.25rem;
        }

        /* Showtimes */
        .showtimes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.25rem;
        }

        .showtime {
            padding: 0.125rem 0.375rem;
            background-color: rgba(255, 140, 66, 0.15);
            border: 1px solid rgba(255, 140, 66, 0.3);
            border-radius: 0.25rem;
            font-size: 0.5rem;
            color: #ffffff;
            white-space: nowrap;
        }

        /* Legend */
        .legend {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            font-size: 0.5625rem;
            color: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .legend-dot {
            width: 0.625rem;
            height: 0.625rem;
            border-radius: 50%;
        }

        .legend-full {
            background-color: #22c55e;
        }

        .legend-partial {
            background-color: #ff8c42;
        }

        .legend-soon {
            background-color: #ef4444;
        }

        /* Icon SVG (简单实现) */
        .icon {
            display: inline;
            width: 0.5rem;
            height: 0.5rem;
            vertical-align: -0.0625rem;
        }

        /* Movie Filter Panel */
        .movie-filter-section {
            background-color: rgba(10, 10, 10, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 0.75rem;
        }

        .movie-filter-container {
            max-width: 56rem;
            margin: 0 auto;
        }

        .filter-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            user-select: none;
        }

        .filter-header:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .filter-toggle-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0;
            width: 1rem;
            height: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter-header-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.6);
        }

        .filter-hidden-count {
            margin-left: auto;
            font-size: 0.6875rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .filter-content {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .filter-content.collapsed {
            max-height: 0;
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .filter-content {
                grid-template-columns: 1fr;
            }
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.375rem;
            font-size: 0.6875rem;
            line-height: 1.2;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .filter-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .filter-checkbox {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .filter-item-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.1875rem;
        }

        .filter-item-title {
            font-weight: 500;
            color: #ffffff;
        }

        .filter-item-scores {
            display: flex;
            gap: 0.5rem;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-score-critics {
            color: #fca5a5;
        }

        .filter-score-audience {
            color: #fbbf24;
        }

        /* 隐藏电影样式 */
        .movie-info.hidden-movie {
            opacity: 0.35;
            color: #6B7280;
            pointer-events: none;
        }

        .movie-info.hidden-movie .showtime {
            background-color: rgba(107, 114, 128, 0.15);
            border-color: rgba(107, 114, 128, 0.3);
            color: rgba(156, 163, 175, 0.8);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-title">
                <div class="header-main">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ff8c42" stroke-width="2">
                        <rect x="2" y="7" width="20" height="15" rx="2"></rect>
                        <path d="M16 3v4M8 3v4"></path>
                    </svg>
                    <h1>AMC 8-WEEK TRACKER</h1>
                </div>
                <div class="header-subtitle" id="lastSyncTime">Last synced: - (Auto-syncs daily at 9 AM)</div>
            </div>
            <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
                <span id="refreshIcon">↻</span>
                <span id="refreshText">REFRESH</span>
            </button>
        </div>
    </header>

    <!-- Movie Filter Section -->
    <section class="movie-filter-section" id="movieFilterSection">
        <div class="movie-filter-container">
            <div class="filter-header" onclick="toggleFilterPanel()">
                <button class="filter-toggle-btn" id="filterToggleBtn">▼</button>
                <span class="filter-header-text">Filter Movies</span>
                <span class="filter-hidden-count" id="filterHiddenCount"></span>
            </div>
            <div class="filter-content" id="filterContent">
                <div id="filterList"></div>
            </div>
        </div>
    </section>

    <main id="mainContent">
        <div class="loading-container">
            <div class="loading-item"></div>
            <div class="loading-item"></div>
            <div class="loading-item"></div>
            <div class="loading-item"></div>
        </div>
    </main>

    <script>
        const DATA_PATH = './data/showtimes.json';
        const UPDATE_TIME_PATH = './data/last_updated.json';

        async function loadData() {
            const refreshBtn = document.getElementById('refreshBtn');
            const refreshIcon = document.getElementById('refreshIcon');
            const refreshText = document.getElementById('refreshText');

            refreshBtn.disabled = true;
            refreshIcon.style.animation = 'spin 0.8s linear infinite';
            refreshText.textContent = 'SCANNING...';

            try {
                const showtimesResponse = await fetch(DATA_PATH + '?t=' + Date.now());
                if (!showtimesResponse.ok) {
                    throw new Error('无法加载排片数据');
                }
                const showtimes = await showtimesResponse.json();

                try {
                    const updateResponse = await fetch(UPDATE_TIME_PATH + '?t=' + Date.now());
                    if (updateResponse.ok) {
                        const updateData = await updateResponse.json();
                        updateSyncTime(updateData.timestamp);
                    }
                } catch (e) {
                    console.warn('无法加载更新时间:', e);
                }

                renderData(showtimes);
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('mainContent').innerHTML = `
                    <div class="error">
                        ⚠️ ${error.message || '无法加载排片数据'}
                    </div>
                `;
            } finally {
                refreshBtn.disabled = false;
                refreshIcon.style.animation = 'none';
                refreshText.textContent = 'REFRESH';
            }
        }

        function updateSyncTime(timestamp) {
            try {
                const date = new Date(timestamp);
                const formatted = date.toLocaleString('en-US', {
                    month: 'numeric',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: 'America/Los_Angeles'
                });
                document.getElementById('lastSyncTime').textContent = `Last synced: ${formatted} (Auto-syncs daily at 9 AM)`;
            } catch (e) {
                console.error('时间格式化失败:', e);
            }
        }

        function getStatusLabel(showtimesCount) {
            if (showtimesCount >= 4) return { text: 'FULL', class: 'status-full' };
            if (showtimesCount > 0) return { text: 'PARTIAL', class: 'status-partial' };
            return { text: 'SOON', class: 'status-soon' };
        }

        // Movie Filter Functions
        const HIDDEN_MOVIES_KEY = 'amcmovie_hidden_movies';

        function buildMovieList(showtimes) {
            const movieMap = new Map();
            for (const theaterKey in showtimes) {
                const theater = showtimes[theaterKey];
                for (const date in theater.dates) {
                    const dateData = theater.dates[date];
                    if (dateData.movies) {
                        for (const movie of dateData.movies) {
                            if (!movieMap.has(movie.slug)) {
                                movieMap.set(movie.slug, {
                                    slug: movie.slug,
                                    title: movie.title,
                                    critics_score: movie.critics_score || null,
                                    audience_score: movie.audience_score || null
                                });
                            }
                        }
                    }
                }
            }
            return Array.from(movieMap.values());
        }

        function sortMoviesByRating(movies) {
            return movies.sort((a, b) => {
                const scoreA = a.critics_score || a.audience_score || 0;
                const scoreB = b.critics_score || b.audience_score || 0;
                return scoreB - scoreA;
            });
        }

        function getHiddenMovies() {
            const stored = localStorage.getItem(HIDDEN_MOVIES_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveHiddenMovies(slugs) {
            localStorage.setItem(HIDDEN_MOVIES_KEY, JSON.stringify(slugs));
        }

        function renderMovieFilter(movies) {
            const sortedMovies = sortMoviesByRating(movies);
            const hiddenMovies = getHiddenMovies();
            let html = '';

            for (const movie of sortedMovies) {
                const isHidden = hiddenMovies.includes(movie.slug);
                const scoreText = [];
                if (movie.critics_score !== null) {
                    scoreText.push(`<span class="filter-score-critics">${movie.critics_score}%</span>`);
                }
                if (movie.audience_score !== null) {
                    scoreText.push(`<span class="filter-score-audience">${movie.audience_score}%</span>`);
                }

                html += `
                    <label class="filter-item">
                        <input type="checkbox" class="filter-checkbox" data-slug="${escapeHtml(movie.slug)}" ${!isHidden ? 'checked' : ''}>
                        <div class="filter-item-content">
                            <div class="filter-item-title">${escapeHtml(movie.title)}</div>
                            ${scoreText.length > 0 ? `<div class="filter-item-scores">${scoreText.join(' | ')}</div>` : ''}
                        </div>
                    </label>
                `;
            }

            document.getElementById('filterList').innerHTML = html;

            // 绑定勾选框事件
            document.querySelectorAll('.filter-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const slug = e.target.dataset.slug;
                    const hidden = getHiddenMovies();
                    if (e.target.checked) {
                        const idx = hidden.indexOf(slug);
                        if (idx > -1) hidden.splice(idx, 1);
                    } else {
                        if (!hidden.includes(slug)) hidden.push(slug);
                    }
                    saveHiddenMovies(hidden);
                    applyMovieFilters(window.currentShowtimes);
                    updateFilterStatus(sortedMovies.length);
                });
            });

            updateFilterStatus(sortedMovies.length);
        }

        function updateFilterStatus(totalMovies) {
            const hidden = getHiddenMovies();
            const count = hidden.length;
            const statusEl = document.getElementById('filterHiddenCount');
            if (count > 0) {
                statusEl.textContent = `(${count} of ${totalMovies} hidden)`;
            } else {
                statusEl.textContent = '';
            }
        }

        function toggleFilterPanel() {
            const content = document.getElementById('filterContent');
            const btn = document.getElementById('filterToggleBtn');
            content.classList.toggle('collapsed');
            btn.textContent = content.classList.contains('collapsed') ? '▶' : '▼';
        }

        function applyMovieFilters(showtimes) {
            const hidden = getHiddenMovies();
            document.querySelectorAll('.movie-info').forEach(el => {
                // 从元素中提取 slug（从标题附近的数据）
                const titleEl = el.querySelector('.movie-title');
                if (titleEl) {
                    const slug = titleEl.dataset.slug;
                    if (slug && hidden.includes(slug)) {
                        el.classList.add('hidden-movie');
                    } else {
                        el.classList.remove('hidden-movie');
                    }
                }
            });
        }

        function renderData(showtimes) {
            // 保存 showtimes 以供后续过滤使用
            window.currentShowtimes = showtimes;

            // 构建电影过滤器
            const movies = buildMovieList(showtimes);
            renderMovieFilter(movies);
            const allDates = new Set();
            const theaterOrder = ['Century City IMAX', 'Century City Dolby Cinema', 'Universal CityWalk IMAX'];

            for (const theaterKey in showtimes) {
                const theater = showtimes[theaterKey];
                for (const date in theater.dates) {
                    allDates.add(date);
                }
            }

            const sortedDates = Array.from(allDates).sort();

            let html = '<div class="table-container">';
            html += '<div class="table-header"><div>DATE</div><div>Century City (IMAX)</div><div>Century City (Dolby)</div><div>Universal (IMAX)</div></div>';

            for (const date of sortedDates) {
                const [y, m, d] = date.split('-').map(Number);
                // 从任何一个剧院数据中获取 day 名称和节假日（所有剧院的同一日期都有相同的值）
                let dayStr = '';
                let holidayName = '';
                for (const theaterKey in showtimes) {
                    if (showtimes[theaterKey].dates[date]) {
                        const dateData = showtimes[theaterKey].dates[date];
                        if (dateData.day) {
                            dayStr = dateData.day.substring(0, 3).toUpperCase();
                        }
                        if (dateData.holiday) {
                            holidayName = dateData.holiday;
                        }
                        break;
                    }
                }
                const dateStr = `${m}/${d}`;
                const holidayClass = holidayName ? ' date-cell-holiday' : '';
                const holidayLabel = holidayName ? `<span class="holiday-label">${escapeHtml(holidayName)}</span>` : '';

                html += '<div class="table-row">';
                html += `<div class="date-cell${holidayClass}"><span class="date-value">${dateStr}</span><span class="day-label">${dayStr}</span>${holidayLabel}</div>`;

                for (const theaterName of theaterOrder) {
                    let theaterKey = null;
                    for (const key in showtimes) {
                        if (showtimes[key].name === theaterName) {
                            theaterKey = key;
                            break;
                        }
                    }

                    html += '<div class="theater-cell">';

                    const shortName = theaterName.includes('Dolby') ? 'Dolby' : (theaterName.includes('Universal') ? 'Universal' : 'CC');
                    const format = theaterName.includes('Dolby') ? 'Dolby Cinema' : 'IMAX';
                    html += `<span class="theater-label">${shortName} ${format}</span>`;

                    if (theaterKey && showtimes[theaterKey].dates[date]) {
                        const dateData = showtimes[theaterKey].dates[date];
                        if (dateData.movies && dateData.movies.length > 0) {
                            for (const movie of dateData.movies) {
                                // is_coming_soon 直接来自爬虫，优先级高于场次数量判断
                                const isComingSoon = movie.is_coming_soon === true;
                                const status = isComingSoon
                                    ? { text: 'SOON', class: 'status-soon' }
                                    : getStatusLabel(movie.showtimes?.length || 0);
                                const statusClass = isComingSoon ? 'status-soon' : '';
                                html += `<div class="movie-info ${statusClass}" data-slug="${escapeHtml(movie.slug)}">`;
                                // 生成购票链接：theater URL + 日期
                                const theaterUrl = showtimes[theaterKey]?.url;
                                const ticketLink = theaterUrl
                                    ? `${theaterUrl}${date}`
                                    : null;
                                const movieLink = ticketLink
                                    ? `<a class="movie-title" href="${escapeHtml(ticketLink)}" target="_blank" rel="noopener noreferrer" data-slug="${escapeHtml(movie.slug)}">${escapeHtml(movie.title)}</a>`
                                    : `<span class="movie-title" data-slug="${escapeHtml(movie.slug)}">${escapeHtml(movie.title)}</span>`;
                                const badge70mm = movie.is_70mm ? '<span class="badge-70mm">70MM</span>' : '';
                                html += `<div class="movie-header">
                                    ${movieLink}${badge70mm}
                                    <span class="status-badge ${status.class}">● ${status.text}</span>
                                </div>`;
                                if (movie.showtimes && movie.showtimes.length > 0) {
                                    html += '<div class="showtimes">';
                                    for (const time of movie.showtimes) {
                                        html += `<span class="showtime">${escapeHtml(time)}</span>`;
                                    }
                                    html += '</div>';
                                }
                                html += '</div>';
                            }
                        } else {
                            html += '<span class="empty">TBD (Schedule Not Released)</span>';
                        }
                    } else {
                        html += '<span class="empty">TBD (Schedule Not Released)</span>';
                    }

                    html += '</div>';
                }

                html += '</div>';
            }

            html += '</div>';

            html += `<div class="legend">
                <div class="legend-item"><span class="legend-dot legend-full"></span>Full Schedule</div>
                <div class="legend-item"><span class="legend-dot legend-partial"></span>Partial</div>
                <div class="legend-item"><span class="legend-dot legend-soon"></span>Soon</div>
            </div>`;

            document.getElementById('mainContent').innerHTML = html;

            // 应用电影过滤效果
            applyMovieFilters(showtimes);
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
