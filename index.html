<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC电影院周末排片 | Los Angeles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --amc-red: #E4002B;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c1;
            --border-color: #2a3f5f;
            --accent: #00d4ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1428 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .header-content h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--amc-red), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-content p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .update-info {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(228, 0, 43, 0.1);
            border-left: 3px solid var(--amc-red);
            border-radius: 4px;
            display: inline-block;
        }

        .update-info span {
            color: var(--text-secondary);
        }

        .update-info .time {
            color: var(--accent);
            font-weight: 600;
        }

        .theater-section {
            margin-bottom: 50px;
        }

        .theater-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(90deg, var(--amc-red), rgba(228, 0, 43, 0.3));
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theater-title::before {
            content: '';
            width: 6px;
            height: 30px;
            background: var(--amc-red);
            border-radius: 3px;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .date-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .date-card:hover {
            border-color: var(--amc-red);
            box-shadow: 0 10px 30px rgba(228, 0, 43, 0.2);
            transform: translateY(-5px);
        }

        .date-header {
            background: linear-gradient(90deg, rgba(228, 0, 43, 0.2), rgba(0, 212, 255, 0.1));
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .date-label {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-value {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-weight: 700;
            margin-top: 5px;
        }

        .movies-list {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .movie-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(228, 0, 43, 0.2);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .movie-item:hover {
            background: rgba(228, 0, 43, 0.1);
            border-color: var(--amc-red);
        }

        .movie-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .showtimes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .showtime {
            padding: 4px 10px;
            background: linear-gradient(135deg, rgba(228, 0, 43, 0.2), rgba(228, 0, 43, 0.1));
            border: 1px solid rgba(228, 0, 43, 0.4);
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .no-movies {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--amc-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            padding: 20px;
            background: rgba(228, 0, 43, 0.15);
            border: 1px solid var(--amc-red);
            border-radius: 8px;
            color: #ff9a9a;
            text-align: center;
        }

        .error-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header-content h1 {
                font-size: 1.8rem;
            }

            .theater-title {
                font-size: 1.3rem;
            }

            .dates-grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 15px;
            }

            header {
                margin-bottom: 30px;
            }
        }

        .refresh-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--amc-red), #ff6b6b);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(228, 0, 43, 0.3);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🍿 AMC电影院周末排片</h1>
                <p>Los Angeles IMAX & Dolby Cinema</p>
                <div class="update-info">
                    <span>最后更新时间：</span>
                    <span class="time" id="updateTime">加载中...</span>
                </div>
                <button class="refresh-btn" onclick="loadData()">刷新数据</button>
            </div>
        </header>

        <main id="mainContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载排片信息中...</p>
            </div>
        </main>

        <footer>
            <p>数据由自动爬虫每天更新 | 仅供参考，请以AMC官网为准</p>
        </footer>
    </div>

    <script>
        const DATA_PATH = './data/showtimes.json';
        const UPDATE_TIME_PATH = './data/last_updated.json';

        async function loadData() {
            try {
                const mainContent = document.getElementById('mainContent');
                mainContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载排片信息中...</p></div>';

                // 获取排片数据
                const showtimesResponse = await fetch(DATA_PATH + '?t=' + Date.now());
                if (!showtimesResponse.ok) {
                    throw new Error('无法加载排片数据');
                }
                const showtimes = await showtimesResponse.json();

                // 获取更新时间
                try {
                    const updateResponse = await fetch(UPDATE_TIME_PATH + '?t=' + Date.now());
                    if (updateResponse.ok) {
                        const updateData = await updateResponse.json();
                        updateTime(updateData.timestamp);
                    }
                } catch (e) {
                    console.warn('无法加载更新时间:', e);
                }

                // 渲染数据
                renderData(showtimes);
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('mainContent').innerHTML = `
                    <div class="error">
                        <div class="error-icon">⚠️</div>
                        <p>无法加载排片数据，请稍后重试或检查网络连接</p>
                    </div>
                `;
            }
        }

        function updateTime(timestamp) {
            const timeElement = document.getElementById('updateTime');
            try {
                const date = new Date(timestamp);
                const formatted = date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    timeZone: 'America/Los_Angeles'
                });
                timeElement.textContent = formatted + ' (LA时间)';
            } catch (e) {
                timeElement.textContent = timestamp;
            }
        }

        function renderData(showtimes) {
            const mainContent = document.getElementById('mainContent');
            let html = '';

            for (const theaterName in showtimes) {
                const theater = showtimes[theaterName];
                html += `<div class="theater-section">
                    <div class="theater-title">${theater.name}</div>
                    <div class="dates-grid">`;

                // 按日期排序
                const sortedDates = Object.keys(theater.dates).sort();

                for (const date of sortedDates) {
                    const dateData = theater.dates[date];
                    // 用本地时间解析日期，避免 UTC 转本地时区导致日期偏移一天
                    const [y, m, d] = date.split('-').map(Number);
                    const dateObj = new Date(y, m - 1, d);
                    const dateStr = dateObj.toLocaleDateString('zh-CN', {
                        month: '2-digit',
                        day: '2-digit'
                    });
                    const dayStr = dateObj.toLocaleDateString('zh-CN', {
                        weekday: 'short'
                    });

                    html += `<div class="date-card">
                        <div class="date-header">
                            <div class="date-label">${dayStr}</div>
                            <div class="date-value">${dateStr}</div>
                        </div>
                        <div class="movies-list">`;

                    if (dateData.movies && dateData.movies.length > 0) {
                        for (const movie of dateData.movies) {
                            html += `<div class="movie-item">
                                <div class="movie-title">${escapeHtml(movie.title)}</div>
                                <div class="showtimes">`;

                            if (movie.showtimes && movie.showtimes.length > 0) {
                                for (const time of movie.showtimes) {
                                    html += `<div class="showtime">${escapeHtml(time)}</div>`;
                                }
                            }

                            html += '</div></div>';
                        }
                    } else {
                        html += '<div class="no-movies">暂无排片</div>';
                    }

                    html += '</div></div>';
                }

                html += '</div></div>';
            }

            mainContent.innerHTML = html;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 页面加载时自动获取数据
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
